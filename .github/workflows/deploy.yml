name: Deba Technologies — Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "deba-deploy"
  cancel-in-progress: true

jobs:

  # ── Job 1: Run all tests ──────────────────────
  test:
    name: Test & Validate
    runs-on: ubuntu-latest
    steps:

    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install backend dependencies
      run: cd backend && npm install

    - name: Run API tests
      run: cd backend && npm test

    - name: Validate HTML files
      run: |
        npm install -g htmlhint
        htmlhint frontend/index.html
        htmlhint frontend/pages/order.html

    - name: Lint Dockerfile (backend)
      uses: hadolint/hadolint-action@v3.1.0
      with:
        dockerfile: backend/Dockerfile
        failure-threshold: error

    - name: Test nginx config
      run: |
        docker run --rm \
          -v $(pwd)/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro \
          nginx:alpine nginx -t

    - name: Validate docker-compose.yml
      run: docker compose config --quiet

  # ── Job 2: Build Docker images ────────────────
  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:

    - uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build & push backend image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/deba-api:latest
          ${{ secrets.DOCKER_USERNAME }}/deba-api:${{ github.sha }}

    - name: Build & push frontend image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/deba-frontend:latest
          ${{ secrets.DOCKER_USERNAME }}/deba-frontend:${{ github.sha }}

  # ── Job 3: Deploy frontend to GitHub Pages ────
  deploy-pages:
    name: Deploy Frontend to GitHub Pages
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/configure-pages@v4
    - uses: actions/upload-pages-artifact@v3
      with:
        path: 'frontend'
    - name: Deploy to GitHub Pages
      id: deploy
      uses: actions/deploy-pages@v4
