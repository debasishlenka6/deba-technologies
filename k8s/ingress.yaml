apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: deba-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: deba.local
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: deba-api-service
            port:
              number: 3000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: deba-frontend-service
            port:
              number: 80